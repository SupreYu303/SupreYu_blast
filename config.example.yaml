# grandMining 核心配置模板文件
# 💡 使用方法：将此文件重命名为 config.yaml，并填入你自己的真实的 API Key

api:
  text:
    key: "your-DeepSeek-API-Key-Here"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
  # 若后续需要切换为智谱 (Zhipu) 的文本大模型，可使用以下配置替换上述 text 配置：
  # text:
  #   key: "请替换为你的智谱_API_KEY"
  #   base_url: "https://open.bigmodel.cn/api/paas/v4/"
  #   model: "glm-4"
  vision:
    key: "your-Qwen-VL-API-Key-Here"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-vl-plus"

paths:
  pdf_dir: "pdfs"
  output_dir: "outputs"
  model_dir: "models"
  txt_dir: "txt_inputs"

settings:
  max_workers: 5  # 线程池并发数

# Semantic Scholar API Key（可选，免费申请）
# 申请地址: https://www.semanticscholar.org/product/api#api-key
# 无 Key 时使用免费额度 (每5分钟100次请求)，有 Key 时每秒1次
# 也可通过环境变量 SEMANTIC_SCHOLAR_API_KEY 设置
semantic_scholar:
  key: ""
